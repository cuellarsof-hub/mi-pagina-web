```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario con CSS</title>

<style>

body{
    background-color:#e6f2ff;
    font-family:Arial, sans-serif;
}

h1{
    color:navy;
}

table{
    background-color:white;
    border-collapse:collapse;
}

td{
    padding:10px;
}

input, textarea{
    padding:5px;
}

input[type=submit]{
    background-color:navy;
    color:white;
}

input[type=reset]{
    background-color:gray;
    color:white;
}

</style>

</head>

<body>

<center>

<h1>FORMULARIO CON CSS</h1>

<form action="resultado.html">

<table border="1">

<tr>
<td>Nombre Completo</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Correo Electrónico</td>
<td><input type="email"></td>
</tr>

<tr>
<td>Contraseña</td>
<td><input type="password"></td>
</tr>

<tr>
<td>Edad</td>
<td><input type="number"></td>
</tr>

<tr>
<td>Género</td>
<td>
<input type="radio" name="g"> Femenino
<input type="radio" name="g"> Masculino
<input type="radio" name="g"> Otro
</td>
</tr>

<tr>
<td>Comentarios</td>
<td>
<textarea rows="4" cols="30"></textarea>
</td>
</tr>

<tr>
<td colspan="2" align="center">

<input type="submit" value="Enviar">

<input type="reset" value="Limpiar">

</td>
</tr>

</table>

</form>
