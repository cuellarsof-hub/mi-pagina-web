<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario de Registro</title>
</head>

<body>

<center>

<h1>FORMULARIO DE REGISTRO</h1>

<form action="resultado.html">

<table border="1" cellpadding="10">

</tr>

</tr>

<tr>
<td>Edad</td>
<td><input type="number"></td>
</tr>

<tr>

</td>

<td>

</tr>

<tr>

</tr>

</table>

</form>
